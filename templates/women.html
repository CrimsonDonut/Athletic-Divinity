<!DOCTYPE html>
<html lang="en">

{% extends 'base.html' %}

{% block title %}Women - Athletic Divinity{% endblock %}

{% block content %}
    <section id="page-header2">
        <h2>Womens</h2>
        <p>Everyone loves them, and so will you.</p>
    </section>
    <section id="product1" class="section-p1">
        <div class="pro-container" id="women-products">
            <!-- Products will be loaded dynamically from API -->
        </div>
        <div class="pagination" id="women-pagination">
            <!-- Pagination controls rendered dynamically -->
        </div>
    </section>

<script>
// Load women's products dynamically from database
async function loadWomensProducts(page = 1) {
    try {
        const response = await fetch(`/api/products?category=women&page=${page}`);
        const data = await response.json();
        
        if (data.success && data.products) {
            const container = document.getElementById('women-products');
            container.innerHTML = '';
            
            data.products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'pro';
                productCard.dataset.id = product.id;
                productCard.innerHTML = renderProductCard(product);
                container.appendChild(productCard);
            });
            
            // Attach event handlers to newly created product cards
            if (typeof attachProductCardHandlers === 'function') {
                attachProductCardHandlers();
            }

            // Render Previous/Next controls when there's more than one page
            if (typeof renderPagination === 'function') {
                renderPagination('women-pagination', data, loadWomensProducts);
            }
        }
    } catch (error) {
        console.error('Error loading womens products:', error);
    }
}

// Load products when DOM is ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => loadWomensProducts(1));
} else {
    loadWomensProducts(1);
}
</script>
{% endblock %}
