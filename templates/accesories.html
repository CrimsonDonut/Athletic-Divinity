{% extends 'base.html' %}

{% block title %}Accessories - Athletic Divinity{% endblock %}

{% block content %}
    <section id="page-header">
        <h2>All Accessories</h2>
        <p>Save more with coupons & up to 60% off!</p>
    </section>

    <section id="product1" class="section-p1">
        <div class="pro-container" id="accessories-products">
            <!-- Products will be loaded dynamically from API -->
        </div>
        <div class="pagination" id="accessories-pagination">
            <!-- Pagination controls rendered dynamically -->
        </div>
    </section>

<script>
// Load accessories products dynamically from database
async function loadAccessoriesProducts(page = 1) {
    try {
        const response = await fetch(`/api/products?category=accessories&page=${page}`);
        const data = await response.json();
        
        if (data.success && data.products) {
            const container = document.getElementById('accessories-products');
            container.innerHTML = '';
            
            data.products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'pro';
                productCard.dataset.id = product.id;
                productCard.innerHTML = renderProductCard(product);
                container.appendChild(productCard);
            });
            
            // Attach event handlers to newly created product cards
            if (typeof attachProductCardHandlers === 'function') {
                attachProductCardHandlers();
            }

            // Render Previous/Next controls when there's more than one page
            if (typeof renderPagination === 'function') {
                renderPagination('accessories-pagination', data, loadAccessoriesProducts);
            }
        }
    } catch (error) {
        console.error('Error loading accessories products:', error);
    }
}

// Load products when DOM is ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => loadAccessoriesProducts(1));
} else {
    loadAccessoriesProducts(1);
}
</script>
{% endblock %}
